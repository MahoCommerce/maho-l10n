# Credentials are read from environment variables (set as repo secrets in CI).
project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_PERSONAL_TOKEN

files:
  - source: /en_US/*.csv
    translation: /%locale_with_underscore%/%original_file_name%
    scheme: 'source_phrase,translation'
  - source: /en_US/template/email/*.html
    translation: /%locale_with_underscore%/template/email/%original_file_name%
  - source: /en_US/template/email/html/*.html
    translation: /%locale_with_underscore%/template/email/html/%original_file_name%
  - source: /en_US/template/email/sales/*.html
    translation: /%locale_with_underscore%/template/email/sales/%original_file_name%
